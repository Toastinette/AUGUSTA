<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MajorBet · Configurateur</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--g0:#0f2318;--g1:#1a3a2a;--g2:#2d5a3d;--gold:#c9a84c;--gold2:#e8c97a;--txt1:#fff;--txt2:#9ab8a6;--txt3:#5a7a68;--r:14px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--g0);color:var(--txt1);min-height:100vh;padding:24px 16px 60px;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(61,122,82,.3) 0%,transparent 70%);}
    .wrap{position:relative;max-width:560px;margin:0 auto;}
    header{text-align:center;padding-bottom:20px;border-bottom:1px solid rgba(201,168,76,.2);margin-bottom:24px;}
    .eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
    h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:var(--txt1);}
    h1 em{color:var(--gold);font-style:italic;}
    .hsub{font-size:12px;color:var(--txt3);margin-top:6px;font-family:'DM Mono',monospace;}

    /* STATUS FIREBASE */
    .fb-status{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;margin-bottom:20px;font-size:12px;font-family:'DM Mono',monospace;}
    .fb-dot{width:8px;height:8px;border-radius:50%;background:#64748b;flex-shrink:0;}
    .fb-dot.ok{background:#4ade80;box-shadow:0 0 6px #4ade8088;}
    .fb-dot.err{background:#ef4444;}
    .fb-txt{flex:1;color:var(--txt2);}

    /* SECTION */
    .section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;margin-bottom:20px;}
    .section-title{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold2);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

    /* PARTICIPANT CARDS */
    .part-list{display:flex;flex-direction:column;gap:12px;}
    .part-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;}
    .part-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .part-card-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
    .part-card-actions{display:flex;gap:6px;}
    .btn-sm{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;color:var(--txt2);font-family:'DM Mono',monospace;transition:background .15s;}
    .btn-sm:hover{background:rgba(255,255,255,.13);}
    .btn-sm.del{color:#f87171;border-color:rgba(239,68,68,.2);}
    .btn-sm.del:hover{background:rgba(239,68,68,.1);}
    .part-fields{display:grid;gap:8px;}
    .field-row{display:grid;grid-template-columns:120px 1fr;gap:8px;align-items:center;}
    .field-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--txt3);}
    .field-input{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--txt1);outline:none;width:100%;transition:border-color .2s;}
    .field-input:focus{border-color:rgba(201,168,76,.4);}

    /* ADD BUTTON */
    .btn-add{width:100%;background:rgba(201,168,76,.1);border:1px dashed rgba(201,168,76,.3);border-radius:12px;padding:12px;font-family:'DM Mono',monospace;font-size:13px;color:var(--gold2);cursor:pointer;margin-top:12px;transition:background .15s;}
    .btn-add:hover{background:rgba(201,168,76,.18);}

    /* SAVE BTN */
    .btn-save{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--g0);border:none;border-radius:14px;padding:16px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;cursor:pointer;margin-top:8px;box-shadow:0 6px 20px rgba(201,168,76,.3);transition:transform .15s,box-shadow .15s;}
    .btn-save:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.4);}
    .btn-save:disabled{opacity:.5;cursor:not-allowed;transform:none;}

    /* DANGER */
    .danger{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);border-radius:12px;padding:14px 16px;}
    .danger-title{font-size:11px;font-family:'DM Mono',monospace;color:#f87171;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
    .danger p{font-size:12px;color:#94a3b8;font-family:'DM Mono',monospace;margin-bottom:10px;line-height:1.6;}
    .btn-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:8px 14px;font-family:'DM Mono',monospace;font-size:12px;color:#f87171;cursor:pointer;transition:background .15s;}
    .btn-danger:hover{background:rgba(239,68,68,.25);}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a3a2a;border:1px solid rgba(74,222,128,.3);border-radius:12px;padding:12px 20px;font-size:13px;font-family:'DM Mono',monospace;color:#4ade80;display:none;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.4);}
    .toast.show{display:block;animation:fadeInOut 2.5s ease forwards;}
    @keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">MajorBet · Admin</div>
    <h1>Configurateur<br/><em>des Participants</em></h1>
    <div class="hsub">Modifie les participants · Sauvegarde dans Firebase</div>
  </header>

  <div class="fb-status">
    <div class="fb-dot" id="fbDot"></div>
    <div class="fb-txt" id="fbTxt">Connexion à Firebase...</div>
  </div>

  <div class="section">
    <div class="section-title">👥 Participants</div>
    <div class="part-list" id="partList"></div>
    <button class="btn-add" onclick="addPart()">+ Ajouter un participant</button>
  </div>

  <button class="btn-save" id="btnSave" onclick="saveAll()">
    💾 Sauvegarder dans Firebase
  </button>

  <div class="section" style="margin-top:20px;">
    <div class="danger">
      <div class="danger-title">⚠️ Nouveau tournoi</div>
      <p>Efface tous les scores figés des rounds précédents.<br/>Les participants sont conservés.</p>
      <button class="btn-danger" onclick="resetScores()">🗑️ Réinitialiser les scores</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,doc,getDoc,setDoc,deleteDoc}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig={
  apiKey:"AIzaSyDG5eeQ3R8lVBe-XFsJuUv82JynPlYzps8",
  authDomain:"majorbet-31fc4.firebaseapp.com",
  projectId:"majorbet-31fc4",
  storageBucket:"majorbet-31fc4.firebasestorage.app",
  messagingSenderId:"564235778775",
  appId:"1:564235778775:web:f0edbd914c5fcd7dc34e92"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let participants=[];

function uid(){return Math.random().toString(36).slice(2,9);}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show';
  setTimeout(()=>t.className='toast',2600);
}

// Charge les participants depuis Firebase
async function loadParts(){
  try{
    const snap=await getDoc(doc(db,'config','participants'));
    if(snap.exists()){
      participants=snap.data().list||[];
    }else{
      // Valeurs par défaut
      participants=[
        {id:'morgan',  name:'Morgan',  golfers:['Justin Rose','Shane Lowry','Tommy Fleetwood','Jason Day'], guess:-11},
        {id:'baptiste',name:'Baptiste',golfers:['Rory McIlroy','Tommy Fleetwood','Ludvig Åberg','Max Homa'], guess:-12},
        {id:'chris',   name:'Chris',   golfers:['Matt Fitzpatrick','Rory McIlroy','Ludvig Åberg','Xander Schauffele'], guess:-17}
      ];
    }
    document.getElementById('fbDot').className='fb-dot ok';
    document.getElementById('fbTxt').textContent='✅ Connecté à Firebase · MajorBet';
    render();
  }catch(e){
    document.getElementById('fbDot').className='fb-dot err';
    document.getElementById('fbTxt').textContent='❌ Erreur Firebase : '+e.message;
  }
}

function render(){
  const list=document.getElementById('partList');
  list.innerHTML='';
  participants.forEach((p,idx)=>{
    const div=document.createElement('div');
    div.className='part-card';
    div.innerHTML=`
      <div class="part-card-header">
        <div class="part-card-name">${p.name||'Nouveau participant'}</div>
        <div class="part-card-actions">
          <button class="btn-sm del" onclick="window.removePart('${p.id}')">🗑️ Supprimer</button>
        </div>
      </div>
      <div class="part-fields">
        <div class="field-row">
          <span class="field-label">Prénom</span>
          <input class="field-input" data-id="${p.id}" data-field="name" value="${p.name||''}" placeholder="Ex: Morgan" oninput="window.updateField('${p.id}','name',this.value)"/>
        </div>
        <div class="field-row">
          <span class="field-label">Joueur 1</span>
          <input class="field-input" value="${p.golfers[0]||''}" placeholder="Ex: Justin Rose" oninput="window.updateGolfer('${p.id}',0,this.value)"/>
        </div>
        <div class="field-row">
          <span class="field-label">Joueur 2</span>
          <input class="field-input" value="${p.golfers[1]||''}" placeholder="Ex: Shane Lowry" oninput="window.updateGolfer('${p.id}',1,this.value)"/>
        </div>
        <div class="field-row">
          <span class="field-label">Joueur 3</span>
          <input class="field-input" value="${p.golfers[2]||''}" placeholder="Ex: Tommy Fleetwood" oninput="window.updateGolfer('${p.id}',2,this.value)"/>
        </div>
        <div class="field-row">
          <span class="field-label">Joueur 4 (hors-EU)</span>
          <input class="field-input" value="${p.golfers[3]||''}" placeholder="Ex: Jason Day" oninput="window.updateGolfer('${p.id}',3,this.value)"/>
        </div>
        <div class="field-row">
          <span class="field-label">Pronostic score</span>
          <input class="field-input" type="number" value="${p.guess??''}" placeholder="Ex: -11" oninput="window.updateField('${p.id}','guess',parseInt(this.value))"/>
        </div>
      </div>`;
    list.appendChild(div);
  });
}

window.updateField=function(id,field,value){
  const p=participants.find(x=>x.id===id);
  if(p)p[field]=value;
};
window.updateGolfer=function(id,idx,value){
  const p=participants.find(x=>x.id===id);
  if(p)p.golfers[idx]=value;
};
window.removePart=function(id){
  if(!confirm('Supprimer ce participant ?'))return;
  participants=participants.filter(p=>p.id!==id);
  render();
};
window.addPart=function(){
  participants.push({id:uid(),name:'',golfers:['','','',''],guess:0});
  render();
  // Scroll vers le bas
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
};

window.saveAll=async function(){
  const btn=document.getElementById('btnSave');
  btn.disabled=true;
  btn.textContent='⏳ Sauvegarde...';
  try{
    // Valide
    for(const p of participants){
      if(!p.name||p.golfers.some(g=>!g)){
        toast('⚠️ Tous les champs sont obligatoires !');
        btn.disabled=false;
        btn.textContent='💾 Sauvegarder dans Firebase';
        return;
      }
    }
    await setDoc(doc(db,'config','participants'),{list:participants});
    toast('✅ Participants sauvegardés !');
  }catch(e){
    toast('❌ Erreur : '+e.message);
  }
  btn.disabled=false;
  btn.textContent='💾 Sauvegarder dans Firebase';
};

window.resetScores=async function(){
  if(!confirm('Effacer tous les scores figés ? Les participants sont conservés.'))return;
  try{
    await deleteDoc(doc(db,'config','frozenRounds'));
    toast('✅ Scores réinitialisés !');
  }catch(e){
    toast('❌ Erreur : '+e.message);
  }
};

loadParts();
</script>
</body>
</html>
