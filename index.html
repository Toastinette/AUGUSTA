<html lang="fr">
<head>

  <style>

                 radial-gradient(ellipse 60% 40% at 90% 110%,rgba(201,168,76,.1) 0%,transparent 60%);}

    .eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
    header h1{font-family:'Playfair Display',serif;font-size:clamp(30px,9vw,42px);font-weight:900;line-height:1;color:var(--txt1);}

    .hsub{font-size:12px;color:var(--txt3);margin-top:6px;font-family:'DM Mono',monospace;letter-spacing:1.5px;}

    .status-bar{display:flex;align-items:center;gap:10px;background:var(--card-bg);border:1px solid var(--card-bd);border-radius:12px;padding:10px 14px;margin-bottom:12px;}

<script>

//  CONFIG
// ═══════════════════════════════════════

  {id:'baptiste',name:'Baptiste',golfers:['Rory McIlroy','Tommy Fleetwood','Ludvig Åberg','Max Homa'], guess:-12},
  {id:'chris',   name:'Chris',   golfers:['Matt Fitzpatrick','Rory McIlroy','Ludvig Åberg','Xander Schauffele'], guess:-17}
];

// Points de position (tranche haute du rang)
const POS_TABLE=[{m:1,p:25},{m:2,p:18},{m:3,p:12},{m:10,p:0},{m:20,p:0},{m:30,p:0}];
// Bonus de palier (cumulatif avec la position)
const PALIER_TABLE=[{m:10,p:8},{m:20,p:5},{m:30,p:3}];

function posPts(r){
  if(!r||r<1)return 0;
  for(const x of POS_TABLE)if(r<=x.m)return x.p;
  return 0;
}
function palierPts(r){
  if(!r||r<1)return 0;
  for(const x of PALIER_TABLE)if(r<=x.m)return x.p;
  return 0;
}
function totalRankPts(r){return posPts(r)+palierPts(r);}
// Exemples: rang1=25+8=33, rang2=18+8=26, rang3=12+8=20, rang4-10=0+8=8, rang11-20=5, rang21-30=3

// ═══════════════════════════════════════
//  PIXEL ART
// ═══════════════════════════════════════
const SVG_STAR=`<svg width="34" height="34" viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg" class="ppx">

<rect x="2" y="3" width="2" height="1" fill="#F1948A" opacity=".55"/>

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z\s]/g,'').trim();}
function fmtStp(n){if(n===null||n===undefined)return{t:'—',c:''};if(n===0)return{t:'E',c:'even'};return n<0?{t:`${n}`,c:'under'}:{t:`+${n}`,c:'over'};}
function ts(){return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
function setBanner(msg,cls='berr'){const z=document.getElementById('bzone');z.innerHTML=msg?`<div class="banner ${cls}">${msg}</div>`:'';;}

// ═══════════════════════════════════════
//  ESPN FETCH
// ═══════════════════════════════════════
async function fetchESPN(){
  const urls=[
    'https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard',
    'https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard?dates=20260409',
  ];
  for(const url of urls){
    try{
      const r=await fetch(url);
      if(!r.ok)continue;
      const d=await r.json();
      const evts=d.events||[];
      const masters=evts.find(e=>(e.name||'').toLowerCase().includes('master'))||evts[0];
      if(masters)return masters;
    }catch(e){/*next*/}
  }
  throw new Error("L'API ESPN est inaccessible depuis ce navigateur.");
}

// ═══════════════════════════════════════
//  PARSE : extrait les joueurs avec leurs scores par round
// ═══════════════════════════════════════
function parseScoreStr(raw){
  if(raw===null||raw===undefined||raw==='')return null;
  const s=String(raw).trim();
  if(s==='--'||s==='CUT'||s==='WD'||s==='DQ'||s==='')return null;
  if(s==='E'||s==='EVEN')return 0;
  const n=parseInt(s.replace(/[^0-9+\-]/g,''),10);
  return isNaN(n)?null:n;
}

function buildRanking(playerList){
  // Trie par score croissant (meilleur = plus bas au golf)
  const sorted=[...playerList].filter(p=>p.stp!==null).sort((a,b)=>a.stp-b.stp);
  // Rang = index parmi les scores DISTINCTS + 1
  const distinct=[...new Set(sorted.map(p=>p.stp))].sort((a,b)=>a-b);
  for(const p of sorted) p.rank=distinct.indexOf(p.stp)+1;
  return sorted;
}

function parseEvent(ev){
  const comp=(ev.competitions||[])[0]||{};
  const st=comp.status||{};
  const currentRound=st.period||1;
  const sn=(st.type?.name||'').toLowerCase();
  const isLive=sn.includes('progress')||sn==='in';
  const isFinal=sn.includes('post')||sn.includes('final')||sn.includes('complete');

  const raw=[];
  for(const c of(ev.competitions||[])){
    for(const ath of(c.competitors||[])){
      const a=ath.athlete||{};
      const name=a.displayName||a.fullName||'';
      if(!name)continue;

      // Score cumulé total
      let stpTotal=null;
      for(const candidate of[ath.score,ath.displayScore]){
        const v=parseScoreStr(candidate);
        if(v!==null){stpTotal=v;break;}
      }

      // Scores par round via linescores
      // ESPN retourne linescores[0]=R1, [1]=R2, etc. en score du jour (relatif au par)
      const ls=ath.linescores||[];
      const roundScores={}; // {1: score_R1, 2: score_R2, ...}
      ls.forEach((l,i)=>{
        // value peut être le score absolu (strokes), displayValue le score relatif
        const v=parseScoreStr(l.displayValue??l.value??null);
        if(v!==null) roundScores[i+1]=v;
      });

      // Si on n'a pas les scores individuels par round mais le total,
      // on peut reconstruire partiellement (utilisé en fallback)
      
      // Cut
      const statusName=(ath.status?.type?.name||ath.status?.type?.description||'').toLowerCase();
      const statusShort=(ath.status?.type?.shortDetail||'').toLowerCase();
      const isCut=statusName.includes('cut')||statusShort.includes('cut')||statusName==='wd'||statusName==='dq';
      const madeCut=isCut?false:(currentRound>=3?true:null);

      raw.push({
        displayName:name,
        normName:norm(name),
        stpTotal,       // score cumulé sur le tournoi
        roundScores,    // scores par round (score du jour isolé)
        madeCut,
        rank:null,
        rankByRound:{}  // sera calculé après
      });
    }
  }

  // Classement sur le cumulé total
  const active=raw.filter(p=>p.madeCut!==false&&p.stpTotal!==null);
  const cut=raw.filter(p=>p.madeCut===false);
  const noScore=raw.filter(p=>p.madeCut!==false&&p.stpTotal===null);

  // Rang total (scores distincts)
  active.sort((a,b)=>a.stpTotal-b.stpTotal);
  const distinctTotal=[...new Set(active.map(p=>p.stpTotal))].sort((a,b)=>a-b);
  for(const p of active) p.rank=distinctTotal.indexOf(p.stpTotal)+1;

  // Rang par round (scores distincts du jour)
  for(let r=1;r<=4;r++){
    const withScore=raw.filter(p=>p.roundScores[r]!==undefined);
    if(withScore.length===0)continue;
    withScore.sort((a,b)=>a.roundScores[r]-b.roundScores[r]);
    const distinctR=[...new Set(withScore.map(p=>p.roundScores[r]))].sort((a,b)=>a-b);
    for(const p of withScore) p.rankByRound[r]=distinctR.indexOf(p.roundScores[r])+1;
  }

  const allPlayers=[...active,...noScore,...cut];
  const leader=active.length>0?active[0]:null;

  return{players:allPlayers,currentRound,isLive,isFinal,leader};
}

// ═══════════════════════════════════════
//  POINTS
// ═══════════════════════════════════════
function calcPtsForRound(player, roundNum, currentRound, isFinal){
  // Points pour un round donné (score isolé du jour)
  if(!player)return{pts:0,nf:true};
  
  // Cut : -5 appliqué uniquement dans le total (pas par jour)
  const isR4=roundNum===4;
  const mult=isR4?2:1;

  const rank=player.rankByRound[roundNum];
  if(rank===undefined)return{pts:0,nf:false,noData:true};

  const pts=totalRankPts(rank)*mult;
  return{pts,rank,score:player.roundScores[roundNum],mult,nf:false};
}

function calcCutBonus(player){
  if(!player)return 0;
  if(player.madeCut===false)return -5;
  if(player.madeCut===true)return 2;
  return 0;
}

function matchPlayer(gName,players){
  const n=norm(gName);
  let f=players.find(p=>p.normName===n);
  if(f)return f;
  const last=n.split(' ').pop();
  if(last.length>3)f=players.find(p=>p.normName.includes(last));
  return f||null;
}

function renderTabs(currentRound){
  const tabs=document.getElementById('tabs');
  const items=[
    {id:'total',label:'TOTAL'},
    {id:'r1',label:'JOUR 1'},
    {id:'r2',label:'JOUR 2'},
    {id:'r3',label:'JOUR 3'},
    {id:'r4',label:'JOUR 4'},
  ];
  tabs.innerHTML=items.map(t=>{
    // Désactive les rounds pas encore joués
    const rNum=t.id==='total'?0:parseInt(t.id.replace('r',''));
    const disabled=rNum>currentRound;
    const active=t.id===gActiveTab;
    return`<button class="tab${active?' active':''}${disabled?' disabled':''}" onclick="${disabled?'':'setTab(\''+t.id+'\')'}">${t.label}</button>`;
  }).join('');
}

function setTab(id){
  gActiveTab=id;
  if(gParsed)renderPodium(gParsed);
}

// ═══════════════════════════════════════
//  RENDER PODIUM
// ═══════════════════════════════════════
function renderPodium(parsed){
  const{players,currentRound,isLive,isFinal,leader}=parsed;
  renderTabs(currentRound);

  const dayNote=document.getElementById('daynote');
  const isTotal=gActiveTab==='total';
  const roundNum=isTotal?null:parseInt(gActiveTab.replace('r',''));

  if(isTotal){
    dayNote.style.display='none';
  } else {
    dayNote.style.display='block';
    const rNames=['','Round 1','Round 2','Round 3','Round 4'];
    const mult=roundNum===4?' · <strong>×2 ce round</strong>':'';
    dayNote.innerHTML=`${rNames[roundNum]} — classement basé sur le score du jour${mult}`;
  }

  // Calcul des points pour chaque participant
  const results=PARTS.map(part=>{
    let total=0;
    const detail=part.golfers.map(g=>{
      const ep=matchPlayer(g,players);

      if(isTotal){
        // Somme de tous les rounds disponibles + cut
        let sumPts=0;
        const byRound=[];
        for(let r=1;r<=currentRound;r++){
          const c=calcPtsForRound(ep,r,currentRound,isFinal);
          if(!c.nf&&!c.noData){
            byRound.push({r,pts:c.pts,rank:c.rank,score:c.score,mult:c.mult});
            sumPts+=c.pts;
          }
        }
        const cutBonus=ep?calcCutBonus(ep):0;
        sumPts+=cutBonus;
        total+=sumPts;
        return{name:g,ep,sumPts,byRound,cutBonus,isTotal:true};
      } else {
        // Score d'un seul round
        const c=calcPtsForRound(ep,roundNum,currentRound,isFinal);
        const pts=c.nf?0:c.pts;
        total+=pts;
        return{name:g,ep,pts,rank:c.rank,score:c.score,mult:c.mult,noData:c.noData,nf:c.nf,isTotal:false};
      }
    });

    // Bonus score exact vainqueur (seulement dans le total, tournoi fini)
    const bonusOK=isTotal&&isFinal&&leader&&part.guess===leader.stpTotal;
    if(bonusOK)total+=10;

    return{...part,total,detail,bonusOK,leaderStp:leader?.stpTotal??null};
  });

  results.sort((a,b)=>b.total-a.total);

  const zone=document.getElementById('pzone');
  zone.innerHTML='';

  results.forEach((p,idx)=>{
    const pr=PRIZES[idx];
    const rk=idx+1;
    const card=document.createElement('div');
    card.className=`pcard r${rk}`;
    card.id='pc-'+p.id;

    const rows=p.detail.map(d=>{
      const{name,ep}=d;
      if(!ep||d.nf)return`<div class="drow"><span class="dn">${name}</span><span class="dp nf">?</span><span class="ds">—</span><span class="dpt zero">—</span></div>`;

      if(d.isTotal){
        // Vue totale : affiche score cumulé + rang + points totaux
        const s=fmtStp(ep.stpTotal);
        const sameRank=ep.rank?players.filter(pl=>pl.rank===ep.rank).length:0;
        const posLbl=ep.madeCut===false?'CUT':ep.rank?(sameRank>1?`T${ep.rank}`:`${ep.rank}`+(ep.rank===1?'er':'e')):'—';
        const posCls=ep.madeCut===false?'cut':ep.rank&&ep.rank<=3?'top3':'';
        const ptsCls=d.sumPts<0?'neg':d.sumPts===0?'zero':'';
        const sign=d.sumPts>=0?'+':'';
        // Détail breakdown par round
        const breakdown=d.byRound.map(b=>`J${b.r}:${b.pts>=0?'+':''}${b.pts}${b.mult===2?'×2':''}`).join(' ');
        const cutStr=d.cutBonus!==0?(d.cutBonus>0?` cut:+${d.cutBonus}`:`cut:${d.cutBonus}`):'';
        return`<div class="drow">
          <span class="dn">${name}</span>
          <span class="dp ${posCls}">${posLbl}</span>
          <span class="ds ${s.c}">${s.t}</span>
          <div style="text-align:right">
            <div class="dpt ${ptsCls}">${sign}${d.sumPts}</div>
            ${breakdown?`<div class="dpt-detail">${breakdown}${cutStr}</div>`:''}
          </div>
        </div>`;
      } else {
        // Vue par jour
        if(d.noData)return`<div class="drow"><span class="dn">${name}</span><span class="dp nf">—</span><span class="ds">—</span><span class="dpt zero">—</span></div>`;
        const s=fmtStp(d.score);
        // Rang dans le round
        const sameRankR=d.rank?players.filter(pl=>pl.rankByRound[roundNum]===d.rank).length:0;
        const posLbl=d.rank?(sameRankR>1?`T${d.rank}`:`${d.rank}`+(d.rank===1?'er':'e')):'—';
        const posCls=d.rank&&d.rank<=3?'top3':'';
        const ptsCls=d.pts<0?'neg':d.pts===0?'zero':'';
        const sign=d.pts>=0?'+':'';
        const x2=d.mult===2?'<span class="x2b">×2</span>':'';
        return`<div class="drow">
          <span class="dn">${name}</span>
          <span class="dp ${posCls}">${posLbl}</span>
          <span class="ds ${s.c}">${s.t}</span>
          <span class="dpt ${ptsCls}">${sign}${d.pts}${x2}</span>
        </div>`;
      }
    }).join('');

    // Bonus / pronostic
    let extraHTML='';
    if(isTotal){
      if(p.bonusOK){
        extraHTML=`<div class="bonus-row"><span>🎯 Bonus score exact vainqueur</span><span>+10 pts</span></div>`;
      } else {
        extraHTML=`<div class="pred">Pronostic vainqueur : <strong>${p.guess}</strong>${isFinal&&p.leaderStp!==null?` · Réel : <strong>${p.leaderStp}</strong>`:''}</div>`;
      }
    }

    card.innerHTML=`
<div class="ptop" onclick="tog('${p.id}')">
  <div class="rnum">${rk}</div>
  ${pr.svg}
  <div class="pinfo">
    <div class="pname">${p.name}</div>
    <div class="plabel ${pr.cls}">${isTotal?pr.label:(roundNum===4?'<span class="x2b">×2</span> points doublés':'Points du round')}</div>
  </div>
  <div class="ppts">
    <div class="ppts-n">${p.total}</div>
    <div class="ppts-l">${isTotal?'TOTAL':'PTS JOUR'}</div>
  </div>
</div>
<div class="pmid" onclick="tog('${p.id}')">
  <span class="chev">▼ détails joueurs</span>
</div>
<div class="detail">
  <div class="din">
    <div class="dhead">
      <span>Joueur</span>
      <span>Rang</span>
      <span>${isTotal?'Cumulé':'Score J.'}</span>
      <span style="text-align:right">Pts</span>
    </div>
    ${rows}
    ${extraHTML}
  </div>
</div>`;
    zone.appendChild(card);
  });

  if(players.length===0)setBanner("Aucun joueur trouvé dans les données ESPN.",'binfo');
}

function tog(id){document.getElementById('pc-'+id)?.classList.toggle('open');}

// ═══════════════════════════════════════
//  MAIN
// ═══════════════════════════════════════
function render(ev){
  const parsed=parseEvent(ev);
  gParsed=parsed;
  const{currentRound,isLive,isFinal}=parsed;
  const rn=['','Round 1','Round 2','Round 3','Round 4'][currentRound]||`Round ${currentRound}`;
  document.getElementById('dot').className='dot'+(isLive?' live':isFinal?' err':'');
  document.getElementById('sround').textContent=rn+(isLive?' · EN DIRECT':isFinal?' · TERMINÉ':'');
  document.getElementById('stime').textContent=ts();
  // Auto-set active tab to current round on first load
  if(gActiveTab==='total'||!['total','r1','r2','r3','r4'].includes(gActiveTab)){
    // Reste sur total
  }
  renderPodium(parsed);
}

async function main(){
  const btn=document.getElementById('btnR');
  const ic=document.getElementById('btnI');
  btn.disabled=true;
  ic.innerHTML='<span class="sp">↻</span>';
  setBanner(null);
  try{
    const ev=await fetchESPN();
    render(ev);
    document.getElementById('dot').className='dot live';
  }catch(e){
    document.getElementById('dot').className='dot err';
    document.getElementById('sround').textContent='Erreur de connexion';
    setBanner(`<strong>Impossible de charger ESPN.</strong><br/>${e.message}<br/><small>Vérifie ta connexion et réessaie.</small>`,'berr');
    document.getElementById('pzone').innerHTML='';
  }
  btn.disabled=false;
  ic.textContent='⛳';
}

main();
</script>
