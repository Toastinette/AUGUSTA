<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Majeurs · Le Pari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --g0:#0f2318;--g1:#1a3a2a;--g2:#2d5a3d;
      --gold:#c9a84c;--gold2:#e8c97a;--cream2:#d4c9b5;
      --txt1:#ffffff;--txt2:#9ab8a6;--txt3:#5a7a68;
      --card-bg:rgba(255,255,255,0.055);--card-bd:rgba(255,255,255,0.09);
      --r:18px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--g0);color:var(--txt1);min-height:100vh;padding-bottom:80px;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(61,122,82,.3) 0%,transparent 70%),
                 radial-gradient(ellipse 60% 40% at 90% 110%,rgba(201,168,76,.1) 0%,transparent 60%);}
    .wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px;}

    /* HEADER */
    header{text-align:center;padding:28px 0 16px;border-bottom:1px solid rgba(201,168,76,.2);margin-bottom:16px;position:relative;}
    .eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
    header h1{font-family:'Playfair Display',serif;font-size:clamp(28px,8vw,40px);font-weight:900;line-height:1;color:var(--txt1);}
    header h1 em{color:var(--gold);font-style:italic;}
    .hsub{font-size:11px;color:var(--txt3);margin-top:6px;font-family:'DM Mono',monospace;letter-spacing:1.5px;}
    .btn-settings{position:absolute;top:28px;right:0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 10px;font-size:16px;cursor:pointer;color:var(--txt2);transition:background .2s;}
    .btn-settings:hover{background:rgba(255,255,255,.12);}

    /* STATUS */
    .status-bar{display:flex;align-items:center;gap:10px;background:var(--card-bg);border:1px solid var(--card-bd);border-radius:12px;padding:10px 14px;margin-bottom:12px;}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#64748b;transition:background .3s;}
    .dot.live{background:#4ade80;box-shadow:0 0 8px #4ade8088;animation:blink 2s infinite;}
    .dot.err{background:#ef4444;}
    .dot.idle{background:#64748b;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
    .s-round{font-family:'DM Mono',monospace;font-size:12px;color:var(--gold);flex:1;}
    .s-time{font-size:11px;color:var(--txt3);font-family:'DM Mono',monospace;white-space:nowrap;}

    /* TABS */
    .tabs{display:flex;gap:5px;margin-bottom:14px;background:rgba(0,0,0,.2);border-radius:14px;padding:4px;}
    .tab{flex:1;text-align:center;padding:8px 3px;border-radius:10px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.3px;color:var(--txt3);cursor:pointer;transition:all .2s;border:none;background:transparent;}
    .tab:hover{color:var(--txt2);}
    .tab.active{background:linear-gradient(135deg,var(--g1),var(--g2));color:var(--gold);font-weight:500;box-shadow:0 2px 8px rgba(0,0,0,.3);}
    .tab.disabled{opacity:.3;cursor:not-allowed;}

    /* BTN */
    .btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--g0);border:none;border-radius:var(--r);padding:14px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;box-shadow:0 6px 24px rgba(201,168,76,.3);transition:transform .15s,box-shadow .15s;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,.4);}
    .btn:active{transform:translateY(0);}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none!important;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .sp{display:inline-block;animation:spin .7s linear infinite;}

    /* BANNER */
    .banner{border-radius:12px;padding:12px 16px;font-size:13px;line-height:1.55;margin-bottom:14px;}
    .berr{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
    .binfo{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);color:var(--gold2);}
    .bnomajor{background:rgba(100,116,139,.1);border:1px solid rgba(100,116,139,.2);color:#94a3b8;text-align:center;padding:24px 16px;}
    .bnomajor .nm-icon{font-size:40px;margin-bottom:10px;}
    .bnomajor .nm-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--txt1);margin-bottom:6px;}
    .bnomajor .nm-sub{font-size:12px;font-family:'DM Mono',monospace;color:var(--txt3);}

    /* DAY NOTE */
    .day-note{font-size:11px;font-family:'DM Mono',monospace;color:var(--txt3);text-align:center;margin-bottom:12px;}
    .day-note strong{color:var(--gold2);}

    /* CARDS */
    .podium{display:flex;flex-direction:column;gap:12px;}
    .pcard{background:var(--card-bg);border:1px solid var(--card-bd);border-radius:var(--r);overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer;}
    .pcard:hover{transform:translateY(-2px);}
    .pcard.r1{border-color:rgba(201,168,76,.45);background:rgba(201,168,76,.07);}
    .pcard.r2{border-color:rgba(178,190,210,.3);}
    .pcard.r3{border-color:rgba(180,90,70,.3);}

    .ptop{display:flex;align-items:center;gap:12px;padding:16px 18px 0;}
    .rnum{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;min-width:28px;text-align:center;line-height:1;}
    .r1 .rnum{color:var(--gold);} .r2 .rnum{color:#b2bed2;} .r3 .rnum{color:#c47858;}
    .ppx{image-rendering:pixelated;display:block;flex-shrink:0;}
    .pinfo{flex:1;min-width:0;}
    .pname{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--txt1);line-height:1.1;}
    .plabel{font-size:11px;color:var(--txt3);margin-top:3px;font-family:'DM Mono',monospace;}
    .plabel.c1{color:var(--gold2);} .plabel.c2{color:#d4839a;} .plabel.c3{color:#d4957a;}
    .ppts{text-align:right;flex-shrink:0;}
    .ppts-n{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:var(--txt1);line-height:1;}
    .ppts-l{font-size:10px;font-family:'DM Mono',monospace;color:var(--txt3);letter-spacing:1.5px;margin-top:2px;}
    .pmid{padding:6px 18px 14px;display:flex;align-items:center;justify-content:flex-end;}
    .chev{font-size:11px;color:var(--txt3);transition:transform .3s;font-family:'DM Mono',monospace;}
    .pcard.open .chev{transform:rotate(180deg);}

    /* DETAIL */
    .detail{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);}
    .pcard.open .detail{max-height:900px;}
    .din{border-top:1px solid rgba(255,255,255,.07);padding:14px 18px 18px;}
    .dhead{display:grid;grid-template-columns:1fr 54px 46px 60px;gap:6px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,.18);}
    .dhead span{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);font-family:'DM Mono',monospace;}
    .dhead span:nth-child(n+2){text-align:center;} .dhead span:last-child{text-align:right;}
    .drow{display:grid;grid-template-columns:1fr 54px 46px 60px;gap:6px;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);}
    .drow:last-child{border-bottom:none;}
    .dn{font-size:13px;font-weight:500;color:var(--txt1);}
    .dp{font-family:'DM Mono',monospace;font-size:11px;text-align:center;padding:3px 5px;border-radius:6px;background:rgba(255,255,255,.07);color:var(--cream2);}
    .dp.cut{background:rgba(239,68,68,.18);color:#fca5a5;}
    .dp.top3{background:rgba(201,168,76,.22);color:var(--gold2);}
    .dp.nf{background:rgba(100,116,139,.15);color:#94a3b8;}
    .ds{font-family:'DM Mono',monospace;font-size:12px;text-align:center;}
    .ds.under{color:#4ade80;} .ds.over{color:#f87171;} .ds.even{color:var(--cream2);}
    .dpt{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;text-align:right;color:var(--gold);}
    .dpt.neg{color:#f87171;} .dpt.zero{color:var(--txt3);}
    .dpt-detail{font-size:10px;color:var(--txt3);font-family:'DM Mono',monospace;text-align:right;margin-top:2px;}
    .bonus-row{margin-top:10px;padding:9px 12px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:10px;display:flex;justify-content:space-between;align-items:center;}
    .bonus-row span:first-child{font-size:12px;color:#86efac;font-family:'DM Mono',monospace;}
    .bonus-row span:last-child{font-size:13px;font-weight:600;color:#4ade80;font-family:'DM Mono',monospace;}
    .pred{font-size:11px;font-family:'DM Mono',monospace;color:var(--txt3);margin-top:10px;}
    .pred strong{color:var(--cream2);}
    .x2b{display:inline-block;background:rgba(201,168,76,.2);color:var(--gold2);font-size:9px;border-radius:4px;padding:1px 4px;margin-left:3px;font-family:'DM Mono',monospace;vertical-align:middle;}

    /* FROZEN BADGE */
    .frozen-badge{display:inline-block;background:rgba(100,116,139,.15);border:1px solid rgba(100,116,139,.25);color:#94a3b8;font-size:9px;border-radius:4px;padding:1px 5px;margin-left:4px;font-family:'DM Mono',monospace;vertical-align:middle;}

    /* SKELETON */
    .skel{height:90px;border-radius:var(--r);background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 100%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;}
    @keyframes shimmer{to{background-position:-200% 0}}

    /* MODAL OVERLAY */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-end;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:#1a2e20;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:24px 20px 40px;}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--txt1);}
    .modal-close{background:rgba(255,255,255,.08);border:none;border-radius:8px;padding:6px 10px;color:var(--txt2);cursor:pointer;font-size:16px;}
    .modal-close:hover{background:rgba(255,255,255,.14);}

    /* PARTICIPANT FORM */
    .part-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
    .part-item{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;}
    .part-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .part-item-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--txt1);}
    .part-actions{display:flex;gap:6px;}
    .btn-edit,.btn-del{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--txt2);font-family:'DM Mono',monospace;}
    .btn-del{color:#f87171;border-color:rgba(239,68,68,.2);}
    .btn-edit:hover{background:rgba(255,255,255,.12);} .btn-del:hover{background:rgba(239,68,68,.1);}
    .part-golfers{font-size:11px;font-family:'DM Mono',monospace;color:var(--txt3);line-height:1.8;}
    .part-guess{font-size:11px;font-family:'DM Mono',monospace;color:var(--gold2);margin-top:4px;}

    /* FORM */
    .form-section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;}
    .form-title{font-size:13px;font-family:'DM Mono',monospace;color:var(--gold2);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
    .form-group{margin-bottom:12px;}
    .form-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--txt3);letter-spacing:.5px;margin-bottom:5px;display:block;}
    .form-input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--txt1);outline:none;transition:border-color .2s;}
    .form-input:focus{border-color:rgba(201,168,76,.4);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .btn-save{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--g0);border:none;border-radius:12px;padding:12px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;margin-top:14px;}
    .btn-save:hover{opacity:.9;}
    .btn-add-part{width:100%;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:12px;font-family:'DM Mono',monospace;font-size:13px;color:var(--gold2);cursor:pointer;margin-bottom:16px;}
    .btn-add-part:hover{background:rgba(201,168,76,.16);}

    /* RESET TOURNAMENT */
    .danger-zone{margin-top:20px;padding:14px 16px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);border-radius:12px;}
    .danger-title{font-size:11px;font-family:'DM Mono',monospace;color:#f87171;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
    .btn-reset{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:8px 14px;font-family:'DM Mono',monospace;font-size:12px;color:#f87171;cursor:pointer;}
    .btn-reset:hover{background:rgba(239,68,68,.25);}

    footer{text-align:center;margin-top:28px;padding-top:18px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;font-family:'DM Mono',monospace;color:var(--txt3);line-height:2;}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow" id="headerEyebrow">Augusta National · 2026</div>
    <h1 id="headerTitle">Majeurs<br/><em>Le Pari</em></h1>
    <div class="hsub" id="headerSub">— · — · —</div>
    <button class="btn-settings" onclick="openSettings()" title="Gérer les participants">⚙️</button>
  </header>

  <div class="status-bar">
    <div class="dot idle" id="dot"></div>
    <div class="s-round" id="sround">Chargement...</div>
    <div class="s-time" id="stime">—</div>
  </div>

  <button class="btn" id="btnR" onclick="main()">
    <span id="btnI">⛳</span>
    <span>Actualiser les scores</span>
  </button>

  <div class="tabs" id="tabs" style="display:none"></div>
  <div id="bzone"></div>
  <div id="daynote" class="day-note" style="display:none"></div>
  <div class="podium" id="pzone">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </div>

  <footer id="footer">Données ESPN · Majeurs Golf · Paris entre amis</footer>
</div>

<!-- MODAL SETTINGS -->
<div class="modal-overlay" id="modalOverlay" onclick="closeSettingsIfOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title">⚙️ Participants</div>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>

    <div class="part-list" id="partList"></div>
    <button class="btn-add-part" onclick="showForm()">+ Ajouter un participant</button>

    <div class="form-section" id="formSection" style="display:none">
      <div class="form-title" id="formTitle">Nouveau participant</div>
      <input type="hidden" id="editId"/>
      <div class="form-group">
        <label class="form-label">Prénom</label>
        <input class="form-input" id="fName" placeholder="Ex: Morgan" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label class="form-label">Joueur 1</label>
        <input class="form-input" id="fG1" placeholder="Ex: Justin Rose" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label class="form-label">Joueur 2</label>
        <input class="form-input" id="fG2" placeholder="Ex: Shane Lowry" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label class="form-label">Joueur 3</label>
        <input class="form-input" id="fG3" placeholder="Ex: Tommy Fleetwood" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label class="form-label">Joueur 4 (hors-européen)</label>
        <input class="form-input" id="fG4" placeholder="Ex: Jason Day" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label class="form-label">Pronostic score vainqueur</label>
        <input class="form-input" id="fGuess" type="number" placeholder="Ex: -11" autocomplete="off"/>
      </div>
      <button class="btn-save" onclick="savePart()">💾 Enregistrer</button>
    </div>

    <div class="danger-zone">
      <div class="danger-title">⚠️ Zone de réinitialisation</div>
      <p style="font-size:12px;color:#94a3b8;font-family:'DM Mono',monospace;margin-bottom:10px;">Efface tous les scores figés des rounds précédents (nouveau Majeur).</p>
      <button class="btn-reset" onclick="resetTournament()">🗑️ Nouveau tournoi</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════
const STORAGE_KEY  = 'golf_pari_participants_v2';
const FROZEN_KEY   = 'golf_pari_frozen_v2';       // points figés par round
const MAJOR_NAMES  = ['masters','pga championship','u.s. open','us open','the open championship','open championship'];

const POS_TABLE    = [{m:1,p:25},{m:2,p:18},{m:3,p:12},{m:10,p:0},{m:20,p:0},{m:30,p:0}];
const PALIER_TABLE = [{m:10,p:8},{m:20,p:5},{m:30,p:3}];

function posPts(r){if(!r||r<1)return 0;for(const x of POS_TABLE)if(r<=x.m)return x.p;return 0;}
function palierPts(r){if(!r||r<1)return 0;for(const x of PALIER_TABLE)if(r<=x.m)return x.p;return 0;}
function totalRankPts(r){return posPts(r)+palierPts(r);}

// ══════════════════════════════════════════════════════
//  PIXEL ART
// ══════════════════════════════════════════════════════
const SVG_STAR=`<svg width="34" height="34" viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg" class="ppx"><rect x="3" y="0" width="2" height="2" fill="#FFD700"/><rect x="0" y="2" width="8" height="2" fill="#FFD700"/><rect x="1" y="4" width="2" height="1" fill="#FFD700"/><rect x="5" y="4" width="2" height="1" fill="#FFD700"/><rect x="0" y="5" width="2" height="3" fill="#FFC200"/><rect x="6" y="5" width="2" height="3" fill="#FFC200"/><rect x="3" y="5" width="2" height="2" fill="#FFD700"/><rect x="2" y="1" width="1" height="1" fill="#FFF5AA" opacity=".5"/></svg>`;
const SVG_WINE=`<svg width="26" height="34" viewBox="0 0 6 9" xmlns="http://www.w3.org/2000/svg" class="ppx"><rect x="1" y="0" width="4" height="1" fill="#9B2335"/><rect x="0" y="1" width="6" height="1" fill="#B52A40"/><rect x="0" y="2" width="6" height="2" fill="#C93050"/><rect x="1" y="4" width="4" height="1" fill="#A52840"/><rect x="2" y="5" width="2" height="2" fill="#8B1E2E"/><rect x="1" y="7" width="4" height="1" fill="#8B1E2E"/><rect x="0" y="8" width="6" height="1" fill="#6B1020"/><rect x="1" y="1" width="1" height="1" fill="#E86890" opacity=".5"/></svg>`;
const SVG_MEAT=`<svg width="38" height="28" viewBox="0 0 10 7" xmlns="http://www.w3.org/2000/svg" class="ppx"><rect x="5" y="0" width="2" height="1" fill="#7B4E2D"/><rect x="5" y="1" width="1" height="2" fill="#7B4E2D"/><rect x="0" y="2" width="10" height="1" fill="#C0392B"/><rect x="0" y="3" width="10" height="2" fill="#E74C3C"/><rect x="0" y="5" width="10" height="1" fill="#C0392B"/><rect x="1" y="6" width="8" height="1" fill="#A93226"/><rect x="2" y="3" width="2" height="1" fill="#F1948A" opacity=".55"/><rect x="5" y="2" width="2" height="1" fill="#F1948A" opacity=".35"/></svg>`;
const PRIZES=[
  {svg:SVG_STAR,cls:'c1',label:'🏆 Vainqueur — ne paye rien !'},
  {svg:SVG_WINE,cls:'c2',label:'🍷 2ème — paye le vin'},
  {svg:SVG_MEAT,cls:'c3',label:'🥩 3ème — paye la viande'}
];

// ══════════════════════════════════════════════════════
//  PARTICIPANTS (localStorage)
// ══════════════════════════════════════════════════════
const DEFAULT_PARTS=[
  {id:'morgan',  name:'Morgan',  golfers:['Justin Rose','Shane Lowry','Tommy Fleetwood','Jason Day'], guess:-11},
  {id:'baptiste',name:'Baptiste',golfers:['Rory McIlroy','Tommy Fleetwood','Ludvig Åberg','Max Homa'], guess:-12},
  {id:'chris',   name:'Chris',   golfers:['Matt Fitzpatrick','Rory McIlroy','Ludvig Åberg','Xander Schauffele'], guess:-17}
];

function loadFrozen(){

}
function saveFrozen(f){localStorage.setItem(FROZEN_KEY,JSON.stringify(f));}

function getFrozenRound(tournKey,roundNum){
  const f=loadFrozen();
  return f[tournKey]?.[roundNum]||null; // null = pas encore figé
}

function freezeRound(tournKey,roundNum,pointsByPart){
  // pointsByPart = { partId: totalPtsThisRound }
  const f=loadFrozen();
  if(!f[tournKey])f[tournKey]={};
  f[tournKey][roundNum]=pointsByPart;
  saveFrozen(f);
}

function resetTournamentData(){
  // Efface uniquement les scores figés (pas les participants)
  localStorage.removeItem(FROZEN_KEY);
}

function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z\s]/g,'').trim();}
function fmtStp(n){if(n===null||n===undefined)return{t:'—',c:''};if(n===0)return{t:'E',c:'even'};return n<0?{t:`${n}`,c:'under'}:{t:`+${n}`,c:'over'};}
function ts(){return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
function uid(){return Math.random().toString(36).slice(2,9);}
function setBanner(msg,cls='berr'){const z=document.getElementById('bzone');z.innerHTML=msg?`<div class="banner ${cls}">${msg}</div>`:'';;}

// ══════════════════════════════════════════════════════
//  ESPN FETCH — filtre uniquement les Majeurs
// ══════════════════════════════════════════════════════
async function fetchESPN(){
  const urls=[
    'https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard',
    'https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard?dates=20260409',
  ];
  for(const url of urls){
    try{
      const r=await fetch(url);
      if(!r.ok)continue;
      const d=await r.json();
      const evts=d.events||[];
      // Cherche uniquement un Majeur
      const major=evts.find(e=>MAJOR_NAMES.some(m=>norm(e.name||'').includes(m)));
      if(major)return{event:major,found:true};
      // Aucun Majeur trouvé
      return{event:null,found:false};
    }catch(e){/* try next url */}
  }
  throw new Error("L'API ESPN est inaccessible depuis ce navigateur.");
}

// ══════════════════════════════════════════════════════
//  PARSE EVENT
// ══════════════════════════════════════════════════════
function parseScoreStr(raw){
  if(raw===null||raw===undefined||raw==='')return null;
  const s=String(raw).trim();
  if(s==='--'||s==='CUT'||s==='WD'||s==='DQ')return null;
  if(s==='E'||s==='EVEN')return 0;
  const n=parseInt(s.replace(/[^0-9+\-]/g,''),10);
  return isNaN(n)?null:n;
}

function parseEvent(ev){
  const comp=(ev.competitions||[])[0]||{};
  const st=comp.status||{};
  const currentRound=st.period||1;
  const sn=(st.type?.name||'').toLowerCase();
  const isLive=sn.includes('progress')||sn==='in';
  const isFinal=(sn.includes('post')||sn.includes('final')||sn.includes('complete'))&&currentRound===4;
  const tournKey=MAJOR_NAMES.find(m=>norm(ev.name||'').includes(m))||'unknown';

  const raw=[];
  for(const c of(ev.competitions||[])){
    for(const ath of(c.competitors||[])){
      const a=ath.athlete||{};
      const name=a.displayName||a.fullName||'';
      if(!name)continue;

      // Score cumulé
      let stpTotal=null;
      for(const cand of[ath.score,ath.displayScore]){
        const v=parseScoreStr(cand);
        if(v!==null){stpTotal=v;break;}
      }

      // Scores par round (linescores) — utilisés UNIQUEMENT pour le bonus score du jour
      const ls=ath.linescores||[];
      const roundScores={};
      ls.forEach((l,i)=>{
        const v=parseScoreStr(l.displayValue??l.value??null);
        if(v!==null)roundScores[i+1]=v;
      });

      // Cut
      const sName=(ath.status?.type?.name||ath.status?.type?.description||'').toLowerCase();
      const sShort=(ath.status?.type?.shortDetail||'').toLowerCase();
      const isCut=sName.includes('cut')||sShort.includes('cut')||sName==='wd'||sName==='dq';
      const madeCut=isCut?false:(currentRound>=3?true:null);

      raw.push({displayName:name,normName:norm(name),stpTotal,roundScores,madeCut,rank:null});
    }
  }

  // Classement UNIQUE : rang cumulé basé sur scores distincts
  const active=raw.filter(p=>p.madeCut!==false&&p.stpTotal!==null);
  const cut=raw.filter(p=>p.madeCut===false);
  const noScore=raw.filter(p=>p.madeCut!==false&&p.stpTotal===null);

  active.sort((a,b)=>a.stpTotal-b.stpTotal);
  const distinctTotal=[...new Set(active.map(p=>p.stpTotal))].sort((a,b)=>a-b);
  for(const p of active)p.rank=distinctTotal.indexOf(p.stpTotal)+1;

  const allPlayers=[...active,...noScore,...cut];
  const leader=active.length>0?active[0]:null;

  return{players:allPlayers,currentRound,isLive,isFinal,leader,tournKey};
}

// ══════════════════════════════════════════════════════
//  CALCUL DES POINTS
// ══════════════════════════════════════════════════════
function calcPtsForRound(player,roundNum){
  if(!player)return{pts:0,nf:true};
  const rank=player.rank;
  if(rank===undefined||rank===null)return{pts:0,nf:false,noData:true};
  const score=player.roundScores[roundNum];
  if(score===undefined)return{pts:0,nf:false,noData:true};
  const isR4=roundNum===4;
  const mult=isR4?2:1;
  const rankPts=totalRankPts(rank);
  const scorePts=score!==null?-score:0;  // -(-7)=+7 / -(+3)=-3
  const pts=(rankPts+scorePts)*mult;
  return{pts,rankPts,scorePts,rank,score,mult,nf:false};
}

function calcCutBonus(player){
  if(!player)return 0;
  if(player.madeCut===false)return -5;
  if(player.madeCut===true)return 2;
  return 0;
}

function matchPlayer(gName,players){
  const n=norm(gName);
  let f=players.find(p=>p.normName===n);
  if(f)return f;
  const last=n.split(' ').pop();
  if(last.length>3)f=players.find(p=>p.normName.includes(last));
  return f||null;
}

// ══════════════════════════════════════════════════════
//  FREEZE LOGIC
//  Quand un round est terminé (ESPN indique complete pour ce round),
//  on fige automatiquement les points et on ne les recalcule plus.
// ══════════════════════════════════════════════════════
function computeRoundPoints(parts,players,roundNum){
  // Retourne { partId: pts } pour ce round uniquement
  const result={};
  for(const part of parts){
    let total=0;
    for(const g of part.golfers){
      const ep=matchPlayer(g,players);
      const c=calcPtsForRound(ep,roundNum);
      if(!c.nf&&!c.noData)total+=c.pts;
    }
    result[part.id]=total;
  }
  return result;
}

function autoFreezeCompletedRounds(parsed,parts){
  // Fige automatiquement les rounds dont ESPN dit qu'ils sont terminés
  // On considère un round r terminé si currentRound > r (le round suivant a commencé)
  // ou si isFinal et r === currentRound
  const{players,currentRound,isFinal,tournKey}=parsed;
  const frozen=loadFrozen();

  for(let r=1;r<=4;r++){
    const isRoundDone=(r<currentRound)||(isFinal&&r===currentRound);
    if(!isRoundDone)continue;
    // Déjà figé ?
    if(frozen[tournKey]?.[r])continue;
    // Figer
    const pts=computeRoundPoints(parts,players,r);
    if(!frozen[tournKey])frozen[tournKey]={};
    frozen[tournKey][r]=pts;
    console.log(`Round ${r} figé pour ${tournKey}:`,pts);
  }
  saveFrozen(frozen);
}

// ══════════════════════════════════════════════════════
//  RENDER PODIUM
// ══════════════════════════════════════════════════════
function renderPodium(parsed){
  const{players,currentRound,isLive,isFinal,leader,tournKey}=parsed;
  const parts=loadParts();

  renderTabs(currentRound,tournKey);

  const dayNote=document.getElementById('daynote');
  const isTotal=gActiveTab==='total';
  const roundNum=isTotal?null:parseInt(gActiveTab.replace('r',''));

  const frozen=loadFrozen();

  if(isTotal){
    dayNote.style.display='none';
  }else{
    dayNote.style.display='block';
    const rNames=['','Round 1','Round 2','Round 3','Round 4'];
    const isFroz=frozen[tournKey]?.[roundNum];
    const mult=roundNum===4?' · <strong>×2</strong>':'';
    const frozNote=isFroz?' · <span style="color:#94a3b8">figé 🔒</span>':'';
    dayNote.innerHTML=`${rNames[roundNum]}${mult}${frozNote}`;
  }

  // Calcul des points pour chaque participant
  const results=parts.map(part=>{
    let total=0;
    const detail=part.golfers.map(g=>{
      const ep=matchPlayer(g,players);

      if(isTotal){
        // Somme de tous les rounds : figés si disponibles, sinon recalcul live
        let sumPts=0;
        const byRound=[];
        for(let r=1;r<=currentRound;r++){
          const frozRound=frozen[tournKey]?.[r];
          if(frozRound){
            // Round figé : utilise les points stockés divisés par nb de golfers
            // On recalcule par golfer depuis le frozen global du participant
            // (On stocke par participant, pas par golfer — on recalcule ici)
            const c=calcPtsForRound(ep,r);
            const pts=(!c.nf&&!c.noData)?c.pts:0;
            byRound.push({r,pts,frozen:true,mult:r===4?2:1});
            sumPts+=pts;
          }else{
            // Round en cours : calcul live
            const c=calcPtsForRound(ep,r);
            if(!c.nf&&!c.noData){
              byRound.push({r,pts:c.pts,rankPts:c.rankPts,scorePts:c.scorePts,rank:c.rank,score:c.score,mult:c.mult,frozen:false});
              sumPts+=c.pts;
            }
          }
        }
        const cutBonus=ep?calcCutBonus(ep):0;
        sumPts+=cutBonus;
        total+=sumPts;
        return{name:g,ep,sumPts,byRound,cutBonus,isTotal:true};

      }else{
        // Vue par round : figé ou live
        const frozRound=frozen[tournKey]?.[roundNum];
        let pts=0;
        let isFrozenData=false;
        let c=null;
        if(frozRound){
          // Recalcule quand même les points individuels du joueur pour l'affichage
          c=calcPtsForRound(ep,roundNum);
          pts=(!c.nf&&!c.noData)?c.pts:0;
          isFrozenData=true;
        }else{
          c=calcPtsForRound(ep,roundNum);
          pts=c.nf?0:c.pts;
        }
        total+=pts;
        return{name:g,ep,pts,rankPts:c?.rankPts,scorePts:c?.scorePts,rank:c?.rank,score:c?.score,mult:c?.mult,noData:c?.noData,nf:c?.nf,isTotal:false,frozen:isFrozenData};
      }
    });

    // Bonus score exact vainqueur : uniquement tournoi terminé (R4 final)
    const bonusOK=isTotal&&isFinal&&leader&&part.guess===leader.stpTotal;
    if(bonusOK)total+=10;

    return{...part,total,detail,bonusOK,leaderStp:leader?.stpTotal??null};
  });

  results.sort((a,b)=>b.total-a.total);

  const zone=document.getElementById('pzone');
  zone.innerHTML='';

  results.forEach((p,idx)=>{
    const pr=PRIZES[Math.min(idx,2)];
    const rk=idx+1;
    const card=document.createElement('div');
    card.className=`pcard r${Math.min(rk,3)}`;
    card.id='pc-'+p.id;

    const rows=p.detail.map(d=>{
      const{name,ep}=d;
      if(!ep||d.nf)return`<div class="drow"><span class="dn">${name}</span><span class="dp nf">?</span><span class="ds">—</span><span class="dpt zero">—</span></div>`;

      if(d.isTotal){
        const s=fmtStp(ep.stpTotal);
        const sameRank=ep.rank?players.filter(pl=>pl.rank===ep.rank).length:0;
        const posLbl=ep.madeCut===false?'CUT':ep.rank?(sameRank>1?`T${ep.rank}`:`${ep.rank}`+(ep.rank===1?'er':'e')):'—';
        const posCls=ep.madeCut===false?'cut':ep.rank&&ep.rank<=3?'top3':'';
        const ptsCls=d.sumPts<0?'neg':d.sumPts===0?'zero':'';
        const sign=d.sumPts>=0?'+':'';
        const breakdown=d.byRound.map(b=>`J${b.r}:${b.pts>=0?'+':''}${b.pts}${b.mult===2?'×2':''}${b.frozen?'🔒':''}`).join(' ');
        const cutStr=d.cutBonus!==0?(d.cutBonus>0?` cut:+${d.cutBonus}`:`cut:${d.cutBonus}`):'';
        return`<div class="drow">
          <span class="dn">${name}</span>
          <span class="dp ${posCls}">${posLbl}</span>
          <span class="ds ${s.c}">${s.t}</span>
          <div style="text-align:right">
            <div class="dpt ${ptsCls}">${sign}${d.sumPts}</div>
            ${breakdown?`<div class="dpt-detail">${breakdown}${cutStr}</div>`:''}
          </div>
        </div>`;
      }else{
        if(d.noData)return`<div class="drow"><span class="dn">${name}</span><span class="dp nf">—</span><span class="ds">—</span><span class="dpt zero">—</span></div>`;
        const s=fmtStp(d.score);
        const sameRankR=d.rank?players.filter(pl=>pl.rank===d.rank).length:0;
        const posLbl=d.rank?(sameRankR>1?`T${d.rank}`:`${d.rank}`+(d.rank===1?'er':'e')):'—';
        const posCls=d.rank&&d.rank<=3?'top3':'';
        const ptsCls=d.pts<0?'neg':d.pts===0?'zero':'';
        const sign=d.pts>=0?'+':'';
        const x2=d.mult===2?'<span class="x2b">×2</span>':'';
        const frozIcon=d.frozen?'<span class="frozen-badge">🔒figé</span>':'';
        const rankPtsDisp=d.rankPts!==undefined?d.rankPts:null;
        const scorePtsDisp=d.scorePts!==undefined?d.scorePts:null;
        const detailSub=(rankPtsDisp!==null&&scorePtsDisp!==null)
          ?`rang:+${rankPtsDisp} score:${scorePtsDisp>=0?'+':''}${scorePtsDisp}`:'';
        return`<div class="drow">
          <span class="dn">${name}</span>
          <span class="dp ${posCls}">${posLbl}</span>
          <span class="ds ${s.c}">${s.t}</span>
          <div style="text-align:right">
            <div class="dpt ${ptsCls}">${sign}${d.pts}${x2}${frozIcon}</div>
            ${detailSub?`<div class="dpt-detail">${detailSub}</div>`:''}
          </div>
        </div>`;
      }
    }).join('');

    let extraHTML='';
    if(isTotal){
      if(p.bonusOK){
        extraHTML=`<div class="bonus-row"><span>🎯 Bonus score exact vainqueur</span><span>+10 pts</span></div>`;
      }else{
        extraHTML=`<div class="pred">Pronostic : <strong>${p.guess}</strong>${isFinal&&p.leaderStp!==null?` · Réel : <strong>${p.leaderStp}</strong>`:''}</div>`;
      }
    }

    card.innerHTML=`
<div class="ptop" onclick="tog('${p.id}')">
  <div class="rnum">${rk}</div>
  ${pr.svg}
  <div class="pinfo">
    <div class="pname">${p.name}</div>
    <div class="plabel ${pr.cls}">${isTotal?pr.label:(roundNum===4?'<span class="x2b">×2</span> points doublés':'Points du round')}</div>
  </div>
  <div class="ppts">
    <div class="ppts-n">${p.total}</div>
    <div class="ppts-l">${isTotal?'TOTAL':'PTS JOUR'}</div>
  </div>
</div>
<div class="pmid" onclick="tog('${p.id}')">
  <span class="chev">▼ détails joueurs</span>
</div>
<div class="detail">
  <div class="din">
    <div class="dhead">
      <span>Joueur</span><span>Rang</span>
      <span>${isTotal?'Cumulé':'Score J.'}</span>
      <span style="text-align:right">Pts</span>
    </div>
    ${rows}
    ${extraHTML}
  </div>
</div>`;
    zone.appendChild(card);
  });

  if(players.length===0)setBanner("Aucun joueur trouvé dans les données ESPN.",'binfo');
}

  updateHeader(ev.name,parts);
  renderPodium(parsed);
}

  document.getElementById('formTitle').textContent=editData?'Modifier le participant':'Nouveau participant';
  document.getElementById('editId').value=editData?.id||'';
  document.getElementById('fName').value=editData?.name||'';
  document.getElementById('fG1').value=editData?.golfers[0]||'';
  document.getElementById('fG2').value=editData?.golfers[1]||'';
  document.getElementById('fG3').value=editData?.golfers[2]||'';
  document.getElementById('fG4').value=editData?.golfers[3]||'';
  document.getElementById('fGuess').value=editData?.guess??'';
  fs.scrollIntoView({behavior:'smooth'});
}

function editPart(id){
  const parts=loadParts();
  const p=parts.find(x=>x.id===id);
  if(p)showForm(p);
}

function deletePart(id){
  if(!confirm('Supprimer ce participant ?'))return;
  const parts=loadParts().filter(p=>p.id!==id);
  saveParts(parts);
  renderPartList();
  if(gParsed)renderPodium(gParsed);
}

function savePart(){
  const name=document.getElementById('fName').value.trim();
  const g1=document.getElementById('fG1').value.trim();
  const g2=document.getElementById('fG2').value.trim();
  const g3=document.getElementById('fG3').value.trim();
  const g4=document.getElementById('fG4').value.trim();
  const guess=parseInt(document.getElementById('fGuess').value,10);

  if(!name||!g1||!g2||!g3||!g4||isNaN(guess)){
    alert('Tous les champs sont obligatoires.');return;
  }

  const parts=loadParts();
  const editId=document.getElementById('editId').value;

  if(editId){
    const idx=parts.findIndex(p=>p.id===editId);
    if(idx>=0)parts[idx]={id:editId,name,golfers:[g1,g2,g3,g4],guess};
  }else{
    parts.push({id:uid(),name,golfers:[g1,g2,g3,g4],guess});
  }

  saveParts(parts);
  document.getElementById('formSection').style.display='none';
  renderPartList();
  if(gParsed)renderPodium(gParsed);
}

function resetTournament(){
  if(!confirm('Effacer tous les scores figés ? (Les participants sont conservés)'))return;
  resetTournamentData();
  alert('Scores réinitialisés. Actualise pour recalculer.');
  if(gParsed)renderPodium(gParsed);
}

// Met à jour le header avec les noms des participants au chargement
(function initHeader(){
  const parts=loadParts();
  document.getElementById('headerSub').textContent=parts.map(p=>p.name.toUpperCase()).join(' · ');
})();

main();
</script>
